<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TPC Asset Library Pilot</title>
    <style>
      :root {
        color: #20333a;
        background: #f6f8f7;
        font-family: Inter, "Nunito Sans", Arial, sans-serif;
      }

      body {
        margin: 0;
      }

      header {
        background: #ffffff;
        border-bottom: 1px solid #dfe7e8;
        padding: 20px clamp(18px, 4vw, 44px);
      }

      h1 {
        font-size: 24px;
        margin: 0 0 6px;
      }

      p {
        color: #5d7077;
        margin: 0;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .chip {
        background: #eef7f4;
        border: 1px solid #c7e3dc;
        border-radius: 999px;
        color: #2b7164;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 10px;
      }

      main {
        padding: 24px clamp(18px, 4vw, 44px) 44px;
      }

      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }

      .asset {
        background: #ffffff;
        border: 1px solid #dfe7e8;
        border-radius: 8px;
        overflow: hidden;
      }

      .preview {
        align-items: center;
        background:
          linear-gradient(45deg, #f2f4f4 25%, transparent 25%),
          linear-gradient(-45deg, #f2f4f4 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #f2f4f4 75%),
          linear-gradient(-45deg, transparent 75%, #f2f4f4 75%);
        background-position: 0 0, 0 12px, 12px -12px, -12px 0;
        background-size: 24px 24px;
        display: flex;
        height: 260px;
        justify-content: center;
        padding: 12px;
      }

      .preview img {
        max-height: 100%;
        max-width: 100%;
      }

      .meta {
        border-top: 1px solid #dfe7e8;
        padding: 12px;
      }

      .name {
        font-weight: 700;
        line-height: 1.3;
        word-break: break-word;
      }

      .path {
        color: #6f8288;
        font-size: 12px;
        margin-top: 6px;
        word-break: break-all;
      }

      .tags {
        color: #4f676f;
        font-size: 12px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TPC Asset Library Pilot</h1>
      <p>Affinity-origin and Affinity-style assets currently registered for the pilot visual asset store.</p>
      <div class="summary" id="summary"></div>
    </header>
    <main>
      <section class="grid" id="assets"></section>
    </main>

    <script type="module">
      import { assetLibrary } from "/src/data/assetLibrary.js";

      const categoryCounts = assetLibrary.reduce((acc, asset) => {
        acc[asset.category] = (acc[asset.category] || 0) + 1;
        return acc;
      }, {});

      document.getElementById("summary").innerHTML = [
        `<span class="chip">${assetLibrary.length} assets</span>`,
        ...Object.entries(categoryCounts)
          .sort(([a], [b]) => a.localeCompare(b))
          .map(([category, count]) => `<span class="chip">${category}: ${count}</span>`)
      ].join("");

      document.getElementById("assets").innerHTML = assetLibrary.map((asset) => `
        <article class="asset">
          <div class="preview">
            <img src="${asset.file}" alt="${asset.label}" />
          </div>
          <div class="meta">
            <div class="name">${asset.label}</div>
            <div class="path">${asset.id}</div>
            <div class="path">${asset.file}</div>
            <div class="tags">${asset.category} · ${asset.tags.slice(0, 4).join(", ")}</div>
          </div>
        </article>
      `).join("");
    </script>
  </body>
</html>
